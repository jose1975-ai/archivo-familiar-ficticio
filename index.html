<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Archivo Familiar Ficticio</title>
  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #f5f5f5;
    }
    h1 {
      font-size: 40px;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      width: 200px;
    }
    img {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Archivo Familiar Ficticio</h1>
<p>Un archivo digital de memorias y relaciones ficticias.</p>

<div class="grid">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <p>Familia Óscar</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <p>Familia Lin Xia</p>
  </div>

</div>

</body>
</html>
