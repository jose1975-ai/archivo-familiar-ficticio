<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Archivo de Familias</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #4e3b2f;
  height: 100vh;
  overflow: hidden;
}

/* 中间卡片 */
.center-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #eae6df;
  padding: 60px 80px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

h1 {
  font-size: 42px;
  letter-spacing: 3px;
}

p {
  color: #666;
  margin-top: 10px;
}

button {
  margin-top: 25px;
  padding: 12px 30px;
  border: 1px solid black;
  background: none;
  cursor: pointer;
}

/* 照片 */
.photo {
  position: absolute;
  width: 130px;
  background: white;
  padding: 6px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

.photo img {
  width: 100%;
}

/* 随机位置 */
.p1 { top: 30px; left: 40px; transform: rotate(-12deg);}
.p2 { top: 80px; right: 80px; transform: rotate(10deg);}
.p3 { bottom: 40px; left: 120px; transform: rotate(8deg);}
.p4 { bottom: 100px; right: 100px; transform: rotate(-15deg);}
.p5 { top: 200px; left: 300px; transform: rotate(5deg);}
</style>

</head>

<body>

<!-- 照片（先用测试图） -->
<div class="photo p1"><img src="https://picsum.photos/200?1"></div>
<div class="photo p2"><img src="https://picsum.photos/200?2"></div>
<div class="photo p3"><img src="https://picsum.photos/200?3"></div>
<div class="photo p4"><img src="https://picsum.photos/200?4"></div>
<div class="photo p5"><img src="https://picsum.photos/200?5"></div>

<!-- 中间 -->
<div class="center-box">
  <h1>ARCHIVO DE FAMILIAS</h1>
  <p>Memorias encontradas</p>
  <button>EXPLORAR FICHAS</button>
</div>

</body>
</html>
