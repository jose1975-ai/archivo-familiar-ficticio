<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Archivo de Familias</title>

<style>
body {
  margin: 0;
  font-family: serif;
  background: #5b4636;
  height: 100vh;
  overflow: hidden;
}

/* 中间卡片 */
.center-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #e8e4dc;
  padding: 60px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
  font-size: 40px;
  letter-spacing: 2px;
}

p {
  margin-top: 10px;
  color: #555;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  border: 1px solid black;
  background: none;
  cursor: pointer;
}

/* 照片 */
.photo {
  position: absolute;
  width: 120px;
  background: white;
  padding: 5px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}

.photo img {
  width: 100%;
}

/* 摆放位置 */
.p1 { top: 30px; left: 40px; transform: rotate(-10deg);}
.p2 { top: 100px; right: 50px; transform: rotate(15deg);}
.p3 { bottom: 40px; left: 100px; transform: rotate(8deg);}
.p4 { bottom: 80px; right: 120px; transform: rotate(-12deg);}
</style>

</head>

<body>

<!-- 照片 -->
<div class="photo p1">
  <img src="https://via.placeholder.com/150">
</div>

<div class="photo p2">
  <img src="https://via.placeholder.com/150">
</div>

<div class="photo p3">
  <img src="https://via.placeholder.com/150">
</div>

<div class="photo p4">
  <img src="https://via.placeholder.com/150">
</div>

<!-- 中间 -->
<div class="center-box">
  <h1>ARCHIVO DE FAMILIAS</h1>
  <p>Memorias encontradas</p>
  <button onclick="alert('Próximamente')">EXPLORAR FICHAS</button>
</div>

</body>
</html>
